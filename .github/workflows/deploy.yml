name: Deploy PhonicsBoard

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.DROPLET_HOST }}
  DEPLOY_USER: root

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # 2. Build web app + Deploy to Droplet
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npx expo export --platform web

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Pre-deployment checks
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== Pre-Deploy Checks ==="

            # Check nginx
            if ! nginx -v &> /dev/null 2>&1; then
              echo "Nginx not found, installing..."
              apt-get update && apt-get install -y nginx
            fi
            echo "Nginx: OK"

            # Create web directory
            mkdir -p /var/www/phonicsboard

            # Check disk space
            echo "Disk: $(df -h /var/www | tail -1 | awk '{print $4}') free"

            echo "=== Checks Complete ==="
          EOF

      - name: Deploy web app (static files)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/var/www/phonicsboard/

      - name: Configure Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOF'
            echo "=== Configuring Nginx ==="

            # Only write nginx config if it doesn't exist yet (preserves certbot SSL)
            if [ ! -f /etc/nginx/sites-available/phonicsboard ]; then
              cat > /etc/nginx/sites-available/phonicsboard << 'NGINXEOF'
          server {
              listen 80;
              server_name phonics.staylo.io;
              root /var/www/phonicsboard;
              index index.html;

              # Gzip compression
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
              gzip_min_length 1000;

              location / {
                  try_files $uri $uri/ /index.html;

                  # Cache static assets
                  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
                      expires 30d;
                      add_header Cache-Control "public, immutable";
                  }
              }

              # Health check
              location /healthz {
                  access_log off;
                  return 200 'ok';
                  add_header Content-Type text/plain;
              }
          }
          NGINXEOF
                ln -sf /etc/nginx/sites-available/phonicsboard /etc/nginx/sites-enabled/phonicsboard
                echo "Nginx config created"

                # Setup SSL with certbot if available
                if command -v certbot &> /dev/null; then
                  echo "Setting up SSL..."
                  certbot --nginx -d phonics.staylo.io --non-interactive --agree-tos --email admin@staylo.io || echo "SSL setup deferred — configure DNS first"
                else
                  echo "Certbot not installed — run: apt install certbot python3-certbot-nginx"
                fi
            else
              echo "Nginx config already exists (preserving SSL)"
            fi

            nginx -t && systemctl reload nginx

            echo "=== Deployment Complete ==="
            echo "Web app: https://phonics.staylo.io"
          EOF

      - name: Validate deployment
        run: |
          sleep 3
          echo "Checking health endpoint..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "curl -sf http://localhost/healthz && echo ' OK' || echo ' Waiting for DNS...'"
          echo "Checking web app files..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "ls -la /var/www/phonicsboard/ | head -10"
